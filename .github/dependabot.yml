version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - patch
          - minor
      runtime-patch-minor:
        dependency-type: production
        update-types:
          - patch
          - minor
      runtime-major:
        dependency-type: production
        update-types:
          - major
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "chore"
    ignore:
      # @types/node major must track the Node runtime (engines: ">=24 <25").
      # Allow 24.x patch/minor; block the jump to 25.x. See commit 236691a.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: "UTC"
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore"